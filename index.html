<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Muhammad Yuter — Developer. Uzbekistan, Tashkent. Vibe coding with Cursor & Claude Code." />
  <title>Muhammad Yuter · Developer</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- Devicons for skill icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

  
  <!-- ========== ANIMATED BACKGROUND ========== -->
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- ========== NAVBAR ========== -->
  <header class="navbar" role="banner">
    <nav class="nav-inner" aria-label="Primary navigation">
      <!-- Logo -->
      <a href="#hero" class="nav-logo" aria-label="Yuter – home">
        <span class="logo-bracket">{</span>MY<span class="logo-bracket">}</span>
      </a>

      <!-- Desktop links -->
      <ul class="nav-links" role="list">
        <li><a href="#about"      class="nav-link" data-section="about">About</a></li>
        <li><a href="#skills"     class="nav-link" data-section="skills">Skills</a></li>
        <li><a href="#projects"   class="nav-link" data-section="projects">Projects</a></li>
        <li><a href="#experience" class="nav-link" data-section="experience">Experience</a></li>
        <li><a href="#contact"    class="nav-link" data-section="contact">Contact</a></li>
      </ul>

      <!-- Right controls -->
      <div class="nav-controls">
        <!-- Dark / Light toggle -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>

        <!-- Mobile hamburger -->
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobileMenu" role="dialog" aria-label="Mobile navigation" hidden>
      <ul role="list">
        <li><a href="#about"      class="nav-link" data-section="about">About</a></li>
        <li><a href="#skills"     class="nav-link" data-section="skills">Skills</a></li>
        <li><a href="#projects"   class="nav-link" data-section="projects">Projects</a></li>
        <li><a href="#experience" class="nav-link" data-section="experience">Experience</a></li>
        <li><a href="#contact"    class="nav-link" data-section="contact">Contact</a></li>
      </ul>
    </div>
  </header>

  <main class="relative z-10">
    <div data-include="sections/hero.html"></div>
    <div data-include="sections/about.html"></div>
    <div data-include="sections/skills.html"></div>
    <div data-include="sections/projects.html"></div>
    <div data-include="sections/experience.html"></div>
    <div data-include="sections/contact.html"></div>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer py-8" role="contentinfo">
    <div class="mx-auto flex w-full max-w-[1200px] flex-col gap-1 px-4 text-center md:px-8 md:text-left">
      <p>Built with ❤️ by <strong>Muhammad Yuter</strong> · Uzbekistan, Tashkent</p>
      <p class="footer-note">Made with Vanilla JS · No frameworks harmed</p>
    </div>
  </footer>

  <!-- ========== SCROLL-TO-TOP ========== -->
  <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top" title="Back to top" hidden>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- Main script -->
  <script src="script.js"></script>
</body>
</html>
