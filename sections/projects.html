<section id="projects" class="projects-section relative z-[1] py-20 md:py-28 lg:py-36" aria-label="Projects">
  <div class="mx-auto w-full max-w-[1200px] px-4 md:px-8">
    <div class="fade-up mb-14 text-center">
      <p class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-[var(--accent-primary)]">My Work</p>
      <h2 class="bg-gradient-to-br from-[var(--text-primary)] via-[var(--text-primary)] to-[var(--accent-secondary)] bg-clip-text text-4xl font-extrabold text-transparent md:text-5xl">Featured Projects</h2>
    </div>

    <div class="project-filters fade-up mb-10 flex flex-wrap justify-center gap-2" role="group" aria-label="Filter projects">
      <button class="filter-btn active rounded-full border border-[var(--glass-border)] bg-gradient-to-br from-[var(--accent-primary)] to-[var(--accent-secondary)] px-5 py-1.5 text-sm font-semibold text-white shadow-[0_4px_18px_var(--accent-glow)] transition" data-filter="all">All</button>
      <button class="filter-btn rounded-full border border-[var(--glass-border)] bg-[var(--glass-bg)] px-5 py-1.5 text-sm font-semibold text-[var(--text-secondary)] transition hover:bg-gradient-to-br hover:from-[var(--accent-primary)] hover:to-[var(--accent-secondary)] hover:text-white" data-filter="web">Web App</button>
      <button class="filter-btn rounded-full border border-[var(--glass-border)] bg-[var(--glass-bg)] px-5 py-1.5 text-sm font-semibold text-[var(--text-secondary)] transition hover:bg-gradient-to-br hover:from-[var(--accent-primary)] hover:to-[var(--accent-secondary)] hover:text-white" data-filter="tool">Tool</button>
    </div>

    <div class="grid grid-cols-[repeat(auto-fill,minmax(340px,1fr))] gap-7 max-md:grid-cols-1" id="projectsGrid" aria-live="polite"></div>
  </div>
</section>
